name: Tableau Extract Refresh Automation

on:
  schedule:
    # 매일 한국 시간 오전 8시 실행
    # (UTC 기준 전날 오후 11시)
    - cron: '0 23 * * *'
  workflow_dispatch:
    # 수동 실행 버튼 활성화

jobs:
  refresh-tableau:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute refresh script
        env:
          TABLEAU_SERVER_URL: ${{ secrets.TABLEAU_SERVER_URL }}
          TABLEAU_TOKEN_NAME: ${{ secrets.TABLEAU_TOKEN_NAME }}
          TABLEAU_TOKEN_VALUE: ${{ secrets.TABLEAU_TOKEN_VALUE }}
          TABLEAU_SITE_ID: ${{ secrets.TABLEAU_SITE_ID }}
        run: python refresh_workbooks.py

      - name: Commit and push log
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add refresh_log.csv
          git commit -m "Update refresh log [$(date +'%Y-%m-%d %H:%M:%S')]" || echo "No changes to commit"
          git push